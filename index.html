<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ULC Public Complaint</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:15px;
}

.box{
background:white;
padding:15px;
border-radius:10px;
}

input,textarea,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:black;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="box">

<h2>UPSIDA LIGHT CARE</h2>

<p>Public Complaint Portal</p>

<input id="name" placeholder="Your Name">

<input id="mobile" placeholder="Mobile Number">

<input id="site" placeholder="Site Name">

<textarea id="problem" placeholder="Problem"></textarea>

<button onclick="saveComplaint()">

Submit Complaint

</button>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyBmz0XkBmGI4fp-bveq_F62Cdh6wkaeCmo",

authDomain: "ulc-pro-max.firebaseapp.com",

databaseURL: "https://ulc-pro-max-default-rtdb.firebaseio.com",

projectId: "ulc-pro-max",

storageBucket: "ulc-pro-max.firebasestorage.app",

messagingSenderId: "377548726317",

appId: "1:377548726317:web:0d1952b940a868d8ced8a4"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

function saveComplaint(){

let complaintData = {

name:document.getElementById('name').value,

mobile:document.getElementById('mobile').value,

site:document.getElementById('site').value,

problem:document.getElementById('problem').value,

date:new Date().toLocaleString(),

status:'Pending'

};

db.ref('complaints').push(complaintData)

.then(function(){

alert('Complaint Submitted Successfully');

})

.catch(function(error){

alert(error);

});

}

</script>

</body>

</html>
